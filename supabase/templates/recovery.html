<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset your password</title>
</head>
<body style="margin:0;padding:0;background-color:#FAFAF7;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#FAFAF7;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border-radius:16px;border:1px solid #E8E8E4;overflow:hidden;">
          <tr>
            <td style="padding:32px 32px 24px;text-align:center;background:linear-gradient(180deg,#E6F7F0 0%,#ffffff 100%);">
              <img src="{{ .SiteURL }}/favicon.svg" width="56" height="56" alt="Affiliate Associate Program" style="display:block;margin:0 auto 16px;border-radius:12px;" />
              <h1 style="margin:0;font-size:22px;line-height:1.3;color:#111111;font-weight:700;">Affiliate Associate Program</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 32px;">
              <h2 style="margin:0 0 12px;font-size:20px;color:#111111;font-weight:700;">Reset your password</h2>
              <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#555555;">
                We received a request to reset the password for <strong style="color:#111111;">{{ .Email }}</strong>. Click below to choose a new password.
              </p>
              <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 0 24px;">
                <tr>
                  <td style="border-radius:12px;background:#111111;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:14px 28px;font-size:15px;font-weight:700;color:#ffffff;text-decoration:none;border-radius:12px;">
                      Reset password
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:0;font-size:12px;line-height:1.6;color:#999999;">
                If you didn't request this, ignore this email — your password won't change.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px 28px;border-top:1px solid #F0F0EC;background:#FAFAF7;">
              <p style="margin:0;font-size:12px;line-height:1.5;color:#999999;text-align:center;">
                © Affiliate Associate Program<br />
                <a href="{{ .SiteURL }}" style="color:#3CB371;text-decoration:none;">Return to app</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
